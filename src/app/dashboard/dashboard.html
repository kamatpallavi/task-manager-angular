<h1>{{title}}</h1>

<hr>

<div>

    <label>Expense Name</label>
    <br>

    <input
        type="text"
        [(ngModel)]="expenseTitle">

</div>

<br>

<div>

    <label>Amount</label>
    <br>

    <input
        type="number"
        [(ngModel)]="amount">

</div>

<br>

<button type="button" (click)="addExpense()">
    Add Expense
</button>

<hr>

<h2>Expenses</h2>

<table border="1">

    <tr>
        <th>Title</th>
        <th>Amount</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    <tr *ngFor="let expense of expenses; let i = index">

        <td>{{expense.title}}</td>

        <td>₹{{expense.amount}}</td>

        <td>{{expense.expenseDate}}</td>

        <td>
            <button (click)="deleteExpense(expense.expenseId)">
                Delete
            </button>
        </td>

    </tr>

</table>

<hr>

<h2>Total Expense : ₹{{totalExpense}}</h2>

<br>
<a routerLink="/summary">View Summary</a>
